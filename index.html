<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Bot - PDF Q&A</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .status {
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9em;
            display: none;
        }

        .status.loading {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
            display: block;
        }

        .status.ready {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .chat-container {
            height: 400px;
            overflow-y: auto;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .message.user {
            background: #667eea;
            color: white;
            margin-left: auto;
            text-align: right;
        }

        .message.bot {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
        }

        .message.bot .sources {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #e0e0e0;
            font-size: 0.85em;
            color: #666;
        }

        .message.bot .sources-title {
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }

        .source-item {
            margin-bottom: 10px;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 5px;
            border-left: 3px solid #667eea;
        }

        .source-rank {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: bold;
            margin-right: 5px;
        }

        .relevance-score {
            display: inline-block;
            color: #28a745;
            font-weight: bold;
            margin-left: 5px;
        }

        .source-content {
            margin-top: 5px;
            color: #555;
            font-size: 0.9em;
        }

        .source-meta {
            margin-top: 5px;
            font-size: 0.8em;
            color: #888;
        }

        .search-method-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 8px;
            font-size: 0.7em;
            font-weight: bold;
            margin-left: 5px;
        }

        .method-hybrid {
            background: #ff6b6b;
            color: white;
        }

        .method-semantic {
            background: #4ecdc4;
            color: white;
        }

        .method-keyword {
            background: #ffd93d;
            color: #333;
        }

        .trace-info {
            margin-top: 15px;
            padding: 12px;
            background: #f0f4ff;
            border-radius: 8px;
            border-left: 3px solid #667eea;
            font-size: 0.85em;
        }

        .trace-title {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 8px;
        }

        .trace-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 8px;
        }

        .trace-item {
            padding: 6px;
            background: white;
            border-radius: 4px;
        }

        .trace-label {
            font-size: 0.75em;
            color: #666;
            text-transform: uppercase;
        }

        .trace-value {
            font-weight: bold;
            color: #333;
            font-size: 1.1em;
        }

        .trace-cost {
            color: #28a745;
        }

        .input-container {
            display: flex;
            gap: 10px;
        }

        #questionInput {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
        }

        #questionInput:focus {
            border-color: #667eea;
        }

        #askButton {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
        }

        #askButton:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        #askButton:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .loading-dots {
            display: inline-block;
        }

        .loading-dots span {
            animation: blink 1.4s infinite both;
            font-size: 1.5em;
        }

        .loading-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {
            0%, 80%, 100% { opacity: 0; }
            40% { opacity: 1; }
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 RAG Bot</h1>
        <p class="subtitle">Ask questions about: ProteinEfficiencyRatio-FinalGuidance-May2026.pdf</p>
        
        <div id="status" class="status loading">Checking connection...</div>
        
        <div class="chat-container" id="chatContainer">
            <div class="empty-state">
                <svg fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd"/>
                </svg>
                <p>Start a conversation by asking a question about the PDF document</p>
            </div>
        </div>
        
        <div class="input-container">
            <input 
                type="text" 
                id="questionInput" 
                placeholder="Ask a question about the PDF..." 
                disabled
            />
            <button id="askButton" disabled>Ask</button>
        </div>
    </div>

    <script>
        // Use relative URL since we're serving from same origin
        const API_URL = window.location.origin;
        console.log('API_URL set to:', API_URL);
        
        const chatContainer = document.getElementById('chatContainer');
        const questionInput = document.getElementById('questionInput');
        const askButton = document.getElementById('askButton');
        const statusDiv = document.getElementById('status');
        
        console.log('Elements loaded:', {
            chatContainer: !!chatContainer,
            questionInput: !!questionInput,
            askButton: !!askButton,
            statusDiv: !!statusDiv
        });

        async function checkHealth() {
            try {
                console.log('Checking health at:', `${API_URL}/health`);
                const response = await fetch(`${API_URL}/health`);
                console.log('Health response:', response.status);
                const data = await response.json();
                console.log('Health data:', data);
                
                if (data.status === 'healthy' && data.rag_initialized) {
                    statusDiv.className = 'status ready';
                    statusDiv.textContent = '✓ Connected - Ready to answer questions';
                    questionInput.disabled = false;
                    askButton.disabled = false;
                } else {
                    statusDiv.className = 'status loading';
                    statusDiv.textContent = '⏳ Loading PDF and initializing RAG system...';
                    setTimeout(checkHealth, 2000);
                }
            } catch (error) {
                console.error('Health check error:', error);
                statusDiv.className = 'status error';
                statusDiv.textContent = '✗ Cannot connect to server. Make sure FastAPI is running on port 5173';
                setTimeout(checkHealth, 5000);
            }
        }

        function addMessage(text, isUser, sources = null, trace = null) {
            const emptyState = chatContainer.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            
            let content = text;
            
            if (!isUser && sources && sources.length > 0) {
                content += '<div class="sources"><div class="sources-title">📊 Retrieved Sources (Ranked by Relevance):</div>';
                sources.forEach((source) => {
                    const pageNum = source.metadata?.page !== undefined ? `Page ${source.metadata.page + 1}` : 'Unknown Page';
                    const relevancePercent = source.relevance_percentage || 0;
                    const method = source.search_method || 'unknown';
                    const keywordScore = source.keyword_score || 0;
                    const semanticScore = source.semantic_score || 0;
                    
                    const methodClass = `method-${method}`;
                    const methodLabel = method.charAt(0).toUpperCase() + method.slice(1);
                    
                    content += `
                        <div class="source-item">
                            <div>
                                <span class="source-rank">Rank #${source.rank}</span>
                                <span class="relevance-score">${relevancePercent}% relevant</span>
                                <span class="search-method-badge ${methodClass}">${methodLabel}</span>
                            </div>
                            <div class="source-content">"${source.content.substring(0, 200)}..."</div>
                            <div class="source-meta">
                                📄 ${pageNum} • Keyword: ${keywordScore} | Semantic: ${semanticScore}%
                            </div>
                            <div class="source-meta" style="margin-top: 3px; font-style: italic;">
                                Citation: [${source.rank}] ${pageNum} - Retrieved via ${methodLabel} search
                            </div>
                        </div>
                    `;
                });
                content += '</div>';
            }
            
            // Add trace information
            if (!isUser && trace) {
                content += `
                    <div class="trace-info">
                        <div class="trace-title">⚡ Performance Trace</div>
                        <div class="trace-grid">
                            <div class="trace-item">
                                <div class="trace-label">Total Time</div>
                                <div class="trace-value">${trace.total_time_ms}ms</div>
                            </div>
                            <div class="trace-item">
                                <div class="trace-label">Semantic Search</div>
                                <div class="trace-value">${trace.semantic_search_ms}ms</div>
                            </div>
                            <div class="trace-item">
                                <div class="trace-label">Keyword Search</div>
                                <div class="trace-value">${trace.keyword_search_ms}ms</div>
                            </div>
                            <div class="trace-item">
                                <div class="trace-label">LLM Generation</div>
                                <div class="trace-value">${trace.llm_generation_ms}ms</div>
                            </div>
                            <div class="trace-item">
                                <div class="trace-label">Tokens In/Out</div>
                                <div class="trace-value">${trace.tokens_input} / ${trace.tokens_output}</div>
                            </div>
                            <div class="trace-item">
                                <div class="trace-label">Total Tokens</div>
                                <div class="trace-value">${trace.tokens_total}</div>
                            </div>
                            <div class="trace-item">
                                <div class="trace-label">Cost</div>
                                <div class="trace-value trace-cost">$${trace.cost_total_usd}</div>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            messageDiv.innerHTML = content;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showLoading() {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message bot';
            loadingDiv.id = 'loading';
            loadingDiv.innerHTML = '<div class="loading-dots"><span>.</span><span>.</span><span>.</span></div>';
            chatContainer.appendChild(loadingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeLoading() {
            const loading = document.getElementById('loading');
            if (loading) {
                loading.remove();
            }
        }

        async function askQuestion() {
            const question = questionInput.value.trim();
            if (!question) return;

            addMessage(question, true);
            questionInput.value = '';
            questionInput.disabled = true;
            askButton.disabled = true;
            showLoading();

            try {
                const response = await fetch(`${API_URL}/query`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ question })
                });

                const data = await response.json();
                removeLoading();

                if (response.ok) {
                    addMessage(data.answer, false, data.source_documents, data.trace);
                } else {
                    addMessage(`Error: ${data.detail || 'Something went wrong'}`, false);
                }
            } catch (error) {
                removeLoading();
                addMessage('Error: Failed to connect to server', false);
            } finally {
                questionInput.disabled = false;
                askButton.disabled = false;
                questionInput.focus();
            }
        }

        askButton.addEventListener('click', askQuestion);
        questionInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !questionInput.disabled) {
                askQuestion();
            }
        });

        checkHealth();
    </script>
</body>
</html>
